<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Painel de Acesso Interno</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #f4f4f4 0%, #e8f4ff 100%);
      text-align: center;
      padding: 50px;
      min-height: 100vh;
      overflow-x: hidden;
    }
 
    h1 {
      cursor: pointer;
      position: relative;
      display: inline-block;
      font-size: 2.5rem;
      color: #1a3c6e;
      margin-bottom: 40px;
    }
 
    h1::after {
      content: " ";
      position: absolute;
      bottom: -5px;
      left: 0;
      width: 0%;
      height: 2px;
      background: #007bff;
      transition: width 0.3s;
    }
 
    h1:hover::after {
      width: 100%;
    }
 
    /* Container para as animações de Natalia */
    .natalia-container {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 15px;
    }
 
    /* Estilo para o nome Natalia flutuante */
    .natalia-flutuante {
      font-size: 1.8rem;
      font-weight: bold;
      color: #1a3c6e;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
      animation: flutuar 3s ease-in-out infinite;
      opacity: 0;
      transform: translateY(20px);
      animation-delay: 0.5s;
      animation-fill-mode: forwards;
    }
 
    /* Estrelas brilhantes ao redor do nome */
    .estrelas {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
    }
 
    .estrela {
      position: absolute;
      background-color: #ffde59;
      border-radius: 50%;
      animation: brilhar 2s infinite alternate;
    }
 
    /* Coração pulsante */
    .coracao {
      font-size: 1.5rem;
      color: #ff3366;
      animation: pulsar 1.5s ease-in-out infinite;
      margin-top: 5px;
      opacity: 0;
      animation-delay: 2s;
      animation-fill-mode: forwards;
    }
 
    /* Animação de entrada para os cards */
    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      margin-top: 20px;
      perspective: 1000px;
    }
 
    .card {
      background: white;
      padding: 20px;
      width: 200px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      transition: transform 0.3s, box-shadow 0.3s;
      opacity: 0;
      transform: translateY(30px);
      animation: aparecer 0.8s forwards;
    }
 
    .card:nth-child(1) { animation-delay: 0.2s; }
    .card:nth-child(2) { animation-delay: 0.4s; }
    .card:nth-child(3) { animation-delay: 0.6s; }
 
    .card:hover {
      transform: translateY(-10px) rotateX(5deg);
      box-shadow: 0 10px 20px rgba(0,0,0,0.15);
    }
 
    .card h3 {
      color: #1a3c6e;
      margin-bottom: 15px;
      font-size: 1.1rem;
    }
 
    .card a {
      display: block;
      margin-top: 10px;
      text-decoration: none;
      color: white;
      background: linear-gradient(90deg, #007bff, #00a8ff);
      padding: 10px;
      border-radius: 5px;
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
    }
 
    .card a:hover {
      background: linear-gradient(90deg, #0056b3, #007bff);
      transform: scale(1.05);
      box-shadow: 0 5px 15px rgba(0,123,255,0.3);
    }
 
    .card a::after {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
      transition: left 0.7s;
    }
 
    .card a:hover::after {
      left: 100%;
    }
 
    /* Efeito de confetes */
    .confete {
      position: fixed;
      width: 10px;
      height: 10px;
      opacity: 0;
      z-index: 99;
      pointer-events: none;
    }
 
    /* Animação de texto especial - MODIFICADO PARA APARECER NO CLIQUE */
    .mensagem-especial {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255, 255, 255, 0.95);
      padding: 15px 25px;
      border-radius: 10px;
      box-shadow: 0 5px 25px rgba(0,0,0,0.2);
      font-size: 1.2rem;
      color: #1a3c6e;
      font-weight: bold;
      z-index: 100;
      border: 2px solid #FFD700;
      opacity: 0;
      transition: opacity 0.3s;
    }
 
    .mensagem-especial.mostrar {
      animation: mostrarMensagem 3s forwards;
    }
 
    /* Botão de oração */
    .botao-oracao {
      display: inline-block;
      background: linear-gradient(135deg, #1a237e, #0d47a1);
      color: white;
      padding:5px 5px;
      border-radius: 50px;
      font-size: 1.2rem;
      font-weight: bold;
      text-decoration: none;
      margin-top: 40px;
      border: 2px solid #FFD700;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
      position: relative;
      overflow: hidden;
      opacity: 0;
      animation: aparecerBotao 1s forwards;
      animation-delay: 1s;
    }
 
    .botao-oracao::before {
      content: "";
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
      transition: left 0.7s;
    }
 
    .botao-oracao:hover::before {
      left: 100%;
    }
 
    .botao-oracao:hover {
      transform: translateY(-5px);
      box-shadow: 0 15px 30px rgba(0, 0, 0, 0.3);
      background: linear-gradient(135deg, #0d47a1, #1a237e);
    }
 
    /* Animações keyframes */
    @keyframes flutuar {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-10px);
      }
      0% {
        opacity: 0;
        transform: translateY(20px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }
 
    @keyframes brilhar {
      0% {
        opacity: 0.3;
        transform: scale(0.8);
      }
      100% {
        opacity: 1;
        transform: scale(1);
      }
    }
 
    @keyframes pulsar {
      0% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.2);
      }
      100% {
        transform: scale(1);
      }
      0% {
        opacity: 0;
      }
      100% {
        opacity: 1;
      }
    }
 
    @keyframes aparecer {
      0% {
        opacity: 0;
        transform: translateY(30px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }
 
    @keyframes aparecerBotao {
      0% {
        opacity: 0;
        transform: translateY(30px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }
 
    @keyframes mostrarMensagem {
      0% {
        opacity: 0;
        transform: translateX(-50%) translateY(20px);
      }
      15% {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
      85% {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
      100% {
        opacity: 0;
        transform: translateX(-50%) translateY(20px);
      }
    }
 
    @keyframes voarConfete {
      0% {
        opacity: 1;
        transform: translateY(0) rotate(0deg);
      }
      100% {
        opacity: 0;
        transform: translateY(100vh) rotate(360deg);
      }
    }
 
    @keyframes brilharEstrela {
      0%, 100% {
        opacity: 0;
      }
      50% {
        opacity: 1;
      }
    }
 
    @keyframes cairPoeiraDourada {
      0% {
        transform: translateY(-100px) rotate(0deg);
        opacity: 0;
      }
      10% {
        opacity: 1;
      }
      100% {
        transform: translateY(100vh) rotate(360deg);
        opacity: 0;
      }
    }
 

 
    /* Estilos para o modal de oração */
    .modal-oracao {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.9);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10000;
      padding: 20px;
      opacity: 0;
      animation: aparecerModal 0.5s forwards;
    }
 
    .conteudo-modal {
      background: linear-gradient(135deg, #1a237e, #0d47a1);
      color: #FFD700;
      padding: 40px;
      border-radius: 20px;
      max-width: 600px;
      border: 3px solid #FFD700;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      position: relative;
      text-align: center;
      transform: scale(0.9);
      animation: ampliarModal 0.5s forwards 0.3s;
    }
 
    @keyframes aparecerModal {
      0% {
        opacity: 0;
      }
      100% {
        opacity: 1;
      }
    }
 
    @keyframes ampliarModal {
      0% {
        transform: scale(0.9);
      }
      100% {
        transform: scale(1);
      }
    }
  </style>
</head>
<body>
  <!-- Container para as animações  -->
  <div class="natalia-container">
    <div class="natalia-flutuante">Bom dia Vidaaa!</div>
    <div class="estrelas" id="estrelas"></div>
    <div class="coracao">❤️</div>
  </div>
 
  <h1 onclick="toggleExtrair()">Habeas Corpus</h1>
 
  <div class="container">


    <div class="card">
      <h3>Classificação dos Processos Recebidos</h3>
      <a href="recebidos-atualizados-cancelados.html" target="_blank">Acessar</a>

    </div>
 
    <div class="card">
      <h3>Verificador de Processos Duplicados</h3>
      <a href="../2 - LISTAGEM DUPLICADOS/index3.html" target="_blank">Acessar</a>
    </div>
 

   <div class="card">
      <h3> Processo Distribuído por Procurado</h3>
      <a href="./distibuicao-por-pj/index.html" target="_blank">Acessar</a>
    </div>
  

    <div class="card">
      <h3>Conferência - Movimentação CIENTE</h3>
      <a href="../SEPARADOR CIENTE/index.html" target="_blank">Acessar</a>
    </div>
  </div>
 
  <!-- Mensagem especial que aparecerá ao clicar no Habeas Corpus -->
  <div id="mensagemDia" class="mensagem-especial">Tenha um dia Iluminado ✨</div>
 <BR><BR><BR><BR><BR><BR><BR><BR><BR><BR><BR><BR><BR><BR><BR><BR><BR></BR>
  <!-- Botão de oração -->
  <button class="botao-oracao" onclick="fazerOracao()">
    🙏 Oração da manhã 🌞
  </button>
 
  <script>
 
    
    // NOVA FUNÇÃO: Mostrar mensagem do dia
    function mostrarMensagemDia() {
      const mensagem = document.getElementById("mensagemDia");
      
      // Remove a classe mostrar se já existir para reiniciar a animação
      mensagem.classList.remove("mostrar");
      
      // Força um reflow para reiniciar a animação
      void mensagem.offsetWidth;
      
      // Adiciona a classe para mostrar com animação
      mensagem.classList.add("mostrar");
      
      // Remove a classe após a animação terminar
      setTimeout(() => {
        mensagem.classList.remove("mostrar");
      }, 3000); // 3 segundos, mesma duração da animação
    }
 
    // Criar estrelas ao redor do nome Natalia
    function criarEstrelasNatalia() {
      const estrelasContainer = document.getElementById('estrelas');
      const cores = ['#ffde59', '#ff9e5d', '#ff6b8b', '#7bed9f', '#70a1ff'];
     
      for (let i = 0; i < 12; i++) {
        const estrela = document.createElement('div');
        estrela.classList.add('estrela');
       
        // Posição aleatória
        const posX = Math.random() * 100;
        const posY = Math.random() * 100;
       
        // Tamanho aleatório
        const tamanho = Math.random() * 10 + 5;
       
        // Cor aleatória
        const cor = cores[Math.floor(Math.random() * cores.length)];
       
        // Atraso de animação aleatório
        const atraso = Math.random() * 2;
       
        estrela.style.left = `${posX}%`;
        estrela.style.top = `${posY}%`;
        estrela.style.width = `${tamanho}px`;
        estrela.style.height = `${tamanho}px`;
        estrela.style.backgroundColor = cor;
        estrela.style.animationDelay = `${atraso}s`;
       
        estrelasContainer.appendChild(estrela);
      }
    }
 
    // Criar efeito de confetes
    function criarConfetes() {
      const cores = ['#ff3366', '#ffde59', '#7bed9f', '#70a1ff', '#9d65c9', '#ff9e5d'];
     
      for (let i = 0; i < 50; i++) {
        const confete = document.createElement('div');
        confete.classList.add('confete');
       
        // Posição inicial aleatória
        const posX = Math.random() * window.innerWidth;
       
        // Cor aleatória
        const cor = cores[Math.floor(Math.random() * cores.length)];
       
        // Tamanho aleatório
        const tamanho = Math.random() * 10 + 5;
       
        // Duração e atraso aleatórios
        const duracao = Math.random() * 3 + 2;
        const atraso = Math.random() * 0.5;
       
        // Forma aleatória (círculo ou quadrado)
        const forma = Math.random() > 0.5 ? '50%' : '0';
       
        confete.style.left = `${posX}px`;
        confete.style.top = `-20px`;
        confete.style.backgroundColor = cor;
        confete.style.width = `${tamanho}px`;
        confete.style.height = `${tamanho}px`;
        confete.style.borderRadius = forma;
        confete.style.animation = `voarConfete ${duracao}s ease-in ${atraso}s forwards`;
       
        document.body.appendChild(confete);
       
        // Remover confete após animação
        setTimeout(() => {
          confete.remove();
        }, (duracao + atraso) * 1000);
      }
    }
 
    // Efeito de entrada para o nome Natalia
    function entradaNatalia() {
      const nome = document.querySelector('.natalia-flutuante');
      let texto = nome.textContent;
      nome.textContent = '';
     
      // Efeito de digitação
      let i = 0;
      const digitar = setInterval(() => {
        if (i < texto.length) {
          nome.textContent += texto.charAt(i);
          i++;
        } else {
          clearInterval(digitar);
        }
      }, 100);
    }
 
    // Função de oração
    function fazerOracao() {
      const oracao = `Senhor Deus Todo-Poderoso,
 
Em nome de Jesus Cristo, clamo pela proteção do Salmo 91.
Cobre-me com Tuas asas poderosas,
Guarda-me em todos os meus caminhos,
Livra-me de todo mal e perigo.
 
Que Teus anjos me sustentem em suas mãos,
E que em Ti eu encontre meu refúgio e fortaleza.
Amém.`;
 
      // Criar modal de oração
      const modal = document.createElement('div');
      modal.className = 'modal-oracao';
     
      const conteudoModal = document.createElement('div');
      conteudoModal.className = 'conteudo-modal';
     
      conteudoModal.innerHTML = `
        <h2 style="color: #FFD700; margin-bottom: 30px;">Oração da manhã 🙏</h2>
        <div style="white-space: pre-line; font-size: 1.2rem; line-height: 1.6; margin-bottom: 30px; text-align: left;">${oracao}</div>
        <button onclick="fecharOracao()" style="
          background: #FFD700;
          color: #1a237e;
          border: none;
          padding: 12px 30px;
          border-radius: 50px;
          font-size: 1.1rem;
          font-weight: bold;
          cursor: pointer;
          transition: all 0.3s;
        ">Amém</button>
      `;
     
      modal.appendChild(conteudoModal);
      document.body.appendChild(modal);
     
      // Adicionar efeito de partículas douradas
      for (let i = 0; i < 30; i++) {
        setTimeout(() => {
          criarParticulaDourada(modal);
        }, i * 50);
      }
    }
 
    // Função para fechar a oração
    function fecharOracao() {
      const modal = document.querySelector('.modal-oracao');
      if (modal) {
        modal.remove();
      }
    }
 
    // Criar partícula dourada para a oração
    function criarParticulaDourada(container) {
      const particula = document.createElement('div');
      particula.style.position = 'absolute';
      particula.style.width = '8px';
      particula.style.height = '8px';
      particula.style.background = '#FFD700';
      particula.style.borderRadius = '50%';
      particula.style.left = `${Math.random() * 100}%`;
      particula.style.top = '0';
      particula.style.animation = `cairPoeiraDourada ${Math.random() * 2 + 1}s linear forwards`;
      particula.style.boxShadow = '0 0 10px #FFD700';
     
      container.appendChild(particula);
     
      setTimeout(() => {
        if (particula.parentNode) {
          particula.remove();
        }
      }, 2000);
    }
 
    // Inicializar animações quando a página carregar
    document.addEventListener('DOMContentLoaded', function() {
      criarEstrelasNatalia();
      entradaNatalia();
     
      // Criar alguns confetes iniciais
      setTimeout(criarConfetes, 1000);
    });
  </script>
</body>
</html>
